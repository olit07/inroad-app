use_default_settings:
  engines:
    keep_only:
      - bing
      - duckduckgo
      - brave
      - yahoo

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "inroad-searxng-internal"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 2
  enable_http2: true

engines:
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    timeout: 8.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
    timeout: 8.0

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    timeout: 10.0

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false
    timeout: 8.0
