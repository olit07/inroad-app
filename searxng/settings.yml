use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "inroad-searxng-internal"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 2
  enable_http2: true
  suspended_times:
    SearxEngineAccessDenied: 60
    SearxEngineTooManyRequests: 60
    SearxEngineCaptcha: 90
    cf_SearxEngineCaptcha: 90
    cf_SearxEngineAccessDenied: 90
    recaptcha_SearxEngineCaptcha: 90

engines:
  # ── Engines we actively use ──────────────────────────────────────────────
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    timeout: 10.0

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false
    timeout: 8.0

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    timeout: 8.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
    timeout: 8.0

  # ── Disable everything else that adds noise or never returns results ──────
  # Note: no shortcut fields here — redefining a shortcut that already exists
  # in the defaults causes "ambiguous shortcut" startup failure in SearXNG 2026+
  - name: google
    engine: google
    shortcut: g
    disabled: false
    timeout: 10.0

  - name: wikipedia
    disabled: true

  - name: startpage
    disabled: true

  - name: mojeek
    disabled: true

  - name: yandex
    shortcut: yx
    disabled: true

  - name: yacy
    shortcut: ycy
    disabled: true

  - name: grokipedia
    disabled: true

  - name: qwant
    engine: qwant
    shortcut: q
    disabled: false
    timeout: 10.0
