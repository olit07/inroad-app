use_default_settings: true

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "inroad-searxng-internal"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 2
  enable_http2: true

engines:
  # ── Engines we actively use ──────────────────────────────────────────────
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    timeout: 10.0

  - name: yahoo
    engine: yahoo
    shortcut: yh
    disabled: false
    timeout: 8.0

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    timeout: 8.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    disabled: false
    timeout: 8.0

  # ── Disable everything else that adds noise or never returns results ──────
  - name: google
    engine: google
    shortcut: g
    disabled: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: true

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: true

  - name: mojeek
    engine: mojeek
    shortcut: mj
    disabled: true

  - name: yandex
    engine: yandex
    shortcut: ya
    disabled: true

  - name: grokipedia
    engine: grokipedia
    shortcut: gp
    disabled: true
