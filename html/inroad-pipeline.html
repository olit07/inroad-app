<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — inroad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #FFFFFF;
    --surface:    #F3F1EE;
    --surface-2:  #EEECEA;
    --border:     #E6E2DB;
    --border-md:  #CEC8BF;
    --green:      #1F4530;
    --green-lite: #EAF2EC;
    --green-mid:  #A8C9B0;
    --green-deep: #122B1E;
    --text:       #1A1714;
    --text-mid:   #3D3831;
    --muted:      #7A7068;
    --subtle:     #ADA79F;
    --serif: 'Lora', Georgia, serif;
    --sans:  'Lato', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: background 0.25s, border-color 0.25s;
  }
  nav.nav-logged-in {
    background: var(--green);
    border-bottom-color: transparent;
  }

  .wordmark { display: flex; align-items: center; gap: 10px; text-decoration: none; }

  .nav-center {
    display: flex; align-items: center; gap: 32px; list-style: none;
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .nav-center a {
    font-size: 0.85rem; font-weight: 400;
    color: var(--muted); text-decoration: none; transition: color 0.15s;
  }
  .nav-center a:hover { color: var(--text); }
  .nav-center a.active { color: var(--green); font-weight: 700; }
  nav.nav-logged-in .nav-center a { color: rgba(255,255,255,0.7); }
  nav.nav-logged-in .nav-center a:hover { color: #fff; }
  nav.nav-logged-in .nav-center a.active { color: #fff; font-weight: 700; }

  .nav-right { display: flex; align-items: center; gap: 10px; }

  .btn-login {
    font-size: 0.83rem; font-weight: 700; font-family: 'Lato', sans-serif;
    color: var(--text); background: transparent;
    border: 1.5px solid var(--border-md);
    padding: 7px 18px; border-radius: 8px; text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-login:hover { border-color: var(--green); color: var(--green); }

  .btn-nav-cta {
    font-size: 0.83rem; font-weight: 700; font-family: 'Lato', sans-serif;
    color: #fff; background: var(--green);
    border: none; padding: 8px 18px;
    border-radius: 8px; text-decoration: none;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn-nav-cta:hover { background: var(--green-deep); }
  nav.nav-logged-in .btn-nav-cta { color: var(--green); background: #fff; }
  nav.nav-logged-in .btn-nav-cta:hover { background: var(--green-lite); }

  .nav-user { display: flex; align-items: center; gap: 12px; }
  .nav-initials {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .btn-settings {
    font-size: 0.82rem; font-weight: 500; font-family: var(--sans);
    color: rgba(255,255,255,0.75); background: transparent;
    border: none; padding: 0; text-decoration: none; cursor: pointer;
    transition: color 0.15s;
  }
  .btn-settings:hover { color: #fff; }

  .nav-refer-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px; font-weight: 700; font-family: var(--sans);
    cursor: pointer; white-space: nowrap; letter-spacing: 0.01em;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-refer-btn:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.7); }

  /* ── REFERRAL MODAL ── */
  .refer-modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(26,23,20,0.45); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center; padding: 24px;
  }
  .refer-modal-backdrop.open { display: flex; }
  .refer-modal {
    background: #fff; border: 1px solid var(--border);
    border-radius: 20px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(26,23,20,0.18); overflow: hidden;
  }
  .refer-modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .refer-modal-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .refer-modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 1.2rem; color: var(--subtle); padding: 2px; line-height: 1; transition: color 0.15s;
  }
  .refer-modal-close:hover { color: var(--text); }
  .refer-modal-body { padding: 20px 24px; }
  .btn-refer-copy {
    background: #fff; color: var(--text-mid);
    border: 1.5px solid var(--border); border-radius: 9px;
    padding: 8px 16px; font-size: 0.8rem; font-weight: 600; font-family: var(--sans);
    cursor: pointer; transition: border-color 0.15s, color 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-refer-copy:hover { border-color: var(--green); color: var(--green); }

  /* ── TWO-COLUMN LAYOUT ── */
  .page-layout {
    display: flex;
    height: calc(100vh - 62px);
    margin-top: 62px;
    overflow: hidden;
  }

  /* ── LISTINGS PANEL (collapsible, ~28%) ── */
  .listings-panel {
    flex: 0 0 28%;
    height: 100%;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: flex-basis 0.25s ease, opacity 0.2s ease;
  }
  .listings-panel.collapsed {
    flex: 0 0 0px;
    overflow: hidden;
    opacity: 0;
    border-right: none;
  }

  /* Invisible click zone covering the full border height */
  .listings-border-zone {
    position: absolute;
    top: 0; bottom: 0;
    left: calc(28% - 5px);
    width: 10px;
    z-index: 15;
    cursor: col-resize;
    transition: left 0.25s ease;
  }
  .listings-border-zone.collapsed { left: -5px; }

  /* Toggle tab on the border between panels */
  .listings-toggle {
    position: absolute;
    left: calc(28% - 1px);
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    width: 18px; height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 6px 6px 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 9px; color: var(--subtle);
    transition: background 0.15s, color 0.15s, left 0.25s ease;
    user-select: none;
  }
  .listings-toggle:hover { background: var(--surface-2); color: var(--text); }
  .listings-toggle.collapsed { left: 0; border-radius: 0 6px 6px 0; }

  .panel-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 8px;
    flex-shrink: 0;
  }

  .panel-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 8px;
  }

  .panel-body { padding: 8px 14px 40px; flex: 1; }

  /* Compact toolbar */
  .toolbar { display: flex; flex-direction: column; gap: 6px; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--subtle); font-size: 12px; pointer-events: none; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 8px 5px 24px;
    font-family: var(--sans); font-size: 0.75rem; color: var(--text); outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--subtle); }
  .search-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(31,69,48,0.07); }

  .filter-wrap {
    display: flex; gap: 3px; overflow-x: auto; padding-bottom: 1px;
    scrollbar-width: none; flex-wrap: nowrap;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }
  .filter-btn {
    font-size: 0.62rem; font-weight: 700;
    background: transparent; color: var(--muted);
    border: 1.5px solid var(--border); border-radius: 100px;
    padding: 3px 9px; cursor: pointer; white-space: nowrap;
    transition: all 0.15s; flex-shrink: 0; opacity: 0.55;
  }
  .filter-btn:hover { opacity: 0.8; }
  .filter-btn.on { opacity: 1; color: #fff; }

  /* Section rows */
  .new-section {
    background: var(--green-lite); border: 1.5px solid var(--green-mid);
    border-radius: 7px; padding: 8px 10px 6px; margin-bottom: 14px;
  }
  .new-section .col-header { color: var(--green-deep); opacity: 0.55; }
  .new-section .job-card { border-color: rgba(31,69,48,0.14); background: rgba(255,255,255,0.6); }
  .new-section .job-card:hover { border-color: var(--green-mid); background: rgba(255,255,255,0.85); }

  .section-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 14px; margin-bottom: 4px;
  }
  .new-section .section-row { margin-top: 0; margin-bottom: 6px; }
  .section-row.collapsible { cursor: pointer; user-select: none; }

  .section-pill {
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 2px 8px; border-radius: 100px;
    white-space: nowrap; display: flex; align-items: center; gap: 4px;
  }
  .section-pill.new-pill { background: var(--green); color: #fff; font-size: 0.62rem; padding: 2px 9px; }
  .pill-dot { width: 5px; height: 5px; background: #6ee29a; border-radius: 50%; flex-shrink: 0; animation: blink 2s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .section-pill.all-pill { background: var(--surface); color: var(--muted); border: 1px solid var(--border); transition: border-color 0.15s, color 0.15s; }
  .pill-count { font-size: 0.56rem; font-weight: 700; background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 100px; }
  .new-pill .pill-count { background: rgba(255,255,255,0.25); }
  .section-chevron { font-size: 9px; color: var(--subtle); transition: transform 0.2s; flex-shrink: 0; }
  .section-row.collapsed .section-chevron { transform: rotate(-90deg); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .new-section .section-line { background: var(--green-mid); opacity: 0.4; }
  .section-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 9999px; opacity: 1; }
  .section-body.collapsed { max-height: 0 !important; opacity: 0; }

  /* Listing cards */
  .col-header {
    display: grid; grid-template-columns: 1fr 44px 68px;
    padding: 2px 7px;
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--subtle);
  }
  .card-list { display: flex; flex-direction: column; gap: 2px; }
  .card-empty { font-size: 0.73rem; color: var(--subtle); padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }

  .job-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; cursor: grab;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
  }
  .job-card:hover { border-color: var(--border-md); background: var(--surface); }
  .job-card:active { cursor: grabbing; }
  .job-card.in-pipeline { border-left: 3px solid; }

  .card-row {
    display: grid; grid-template-columns: 1fr 44px 68px;
    align-items: center; padding: 4px 7px; min-height: 28px; gap: 4px;
  }
  .card-left { min-width: 0; }
  .card-company { font-size: 0.71rem; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-programme { font-size: 0.63rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .card-date { font-size: 0.64rem; color: var(--subtle); white-space: nowrap; font-variant-numeric: tabular-nums; }
  .card-date.fresh { color: var(--green); font-weight: 700; }

  .card-right { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .apply-btn-inline {
    font-size: 0.6rem; font-weight: 700;
    background: var(--green); color: #fff;
    border: none; border-radius: 4px;
    padding: 2px 7px; cursor: pointer; text-decoration: none; white-space: nowrap;
    transition: background 0.12s;
  }
  .apply-btn-inline:hover { background: var(--green-deep); }

  .stage-badge {
    font-size: 0.55rem; font-weight: 700; border-radius: 4px;
    padding: 2px 5px; white-space: nowrap; line-height: 1.4;
    max-width: 64px; overflow: hidden; text-overflow: ellipsis;
  }

  .job-card.dragging { opacity: 0.4; }

  /* ── PIPELINE PANEL (fills remaining space) ── */
  .pipeline-panel {
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pipeline-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(243,241,238,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px 8px;
    flex-shrink: 0;
  }

  .pipeline-title {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--subtle); margin-bottom: 4px;
  }

  .pipeline-stats {
    font-size: 0.72rem; color: var(--muted);
  }
  .pipeline-stats strong { color: var(--text); }

  /* Horizontal kanban track — centred both axes */
  .kanban-track {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: auto;
    overflow-y: auto;
    flex: 1;
  }
  .kanban-track::-webkit-scrollbar { height: 5px; }
  .kanban-track::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }

  /* Inner row — columns sit inside this, starts at top within itself */
  .kanban-inner {
    display: flex;
    flex-direction: row;
    gap: 0;
    align-items: flex-start;
  }

  /* Horizontal arrow between columns */
  .kanban-arrow {
    flex-shrink: 0;
    width: 28px;
    display: flex;
    align-items: flex-start;
    padding-top: 13px;
    justify-content: center;
    color: var(--border-md);
    font-size: 13px;
    user-select: none;
  }

  /* Each column: active stage on top, rejection stage below */
  .kanban-col {
    flex: 0 0 200px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Down arrow between active and rejection block */
  .kstage-down-arrow {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 20px;
    color: var(--border-md);
    font-size: 13px;
    user-select: none;
    flex-shrink: 0;
  }

  /* Stage block (active or rejection) */
  .kstage-block {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.07);
    background: #fff;
  }
  .kstage-block.rejection-block { opacity: 0.85; }

  .kstage-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 9px;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.01em;
    line-height: 1.3;
  }
  .kstage-hdr-label { flex: 1; }
  .kstage-cnt {
    font-size: 0.63rem; font-weight: 700;
    border-radius: 100px; padding: 1px 7px; min-width: 20px; text-align: center;
    flex-shrink: 0;
  }

  .drop-zone {
    min-height: 40px;
    padding: 5px 6px;
    background: rgba(255,255,255,0.3);
    border-top: 1px solid rgba(0,0,0,0.05);
    transition: background 0.15s;
  }
  .rejection-block .drop-zone {
    min-height: 32px;
    background: rgba(255,255,255,0.2);
  }
  .drop-zone.drag-over { background: rgba(255,255,255,0.8); outline: 2px dashed rgba(31,69,48,0.28); outline-offset: -3px; }
  .dz-hint { font-size: 0.62rem; color: var(--subtle); display: block; text-align: center; padding: 5px 0; font-style: italic; }

  /* Pipeline chips */
  .pipeline-chip {
    display: grid; grid-template-columns: 1fr auto;
    align-items: center; gap: 4px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 5px;
    margin-bottom: 3px; cursor: grab;
    font-size: 0.65rem;
    transition: border-color 0.12s;
  }
  .pipeline-chip:hover { border-color: var(--border-md); }
  .pipeline-chip:active { cursor: grabbing; }
  .chip-info { min-width: 0; }
  .chip-co { font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .chip-prog { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-size: 0.6rem; margin-top: 1px; }
  .chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--subtle); font-size: 0.8rem; line-height: 1;
    padding: 0 1px; flex-shrink: 0; transition: color 0.12s;
  }
  .chip-remove:hover { color: #b91c1c; }
</style>
</head>
<body>

<nav id="main-nav">
  <a href="/" class="wordmark">
    <svg width="28" height="28" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><rect width="88" height="88" rx="22" fill="#1F4530"/><path d="M26 24 L54 44 L26 64" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="54" y1="44" x2="70" y2="44" stroke="white" stroke-width="8" stroke-linecap="round"/></svg>
    <span style="font-family:'Lora',Georgia,serif;font-weight:700;letter-spacing:-0.02em;font-size:1.25rem;color:var(--text);" id="wordmark-text">inroad</span>
  </a>
  <ul class="nav-center" id="nav-center">
    <li><a href="/opportunities">Opportunities</a></li>
    <li><a href="/pipeline" class="active">Pipeline</a></li>
  </ul>
  <div class="nav-right" id="nav-right">
    <a href="/login?next=/pipeline" class="btn-login">Login / Sign up</a>
    <a href="/opportunities" class="btn-nav-cta">Get started free →</a>
  </div>
</nav>

<!-- Referral modal -->
<div class="refer-modal-backdrop" id="refer-modal-overlay" onclick="if(event.target===this)closeReferModal()">
  <div class="refer-modal">
    <div class="refer-modal-header">
      <div class="refer-modal-title">Get 5 daily emails</div>
      <button class="refer-modal-close" onclick="closeReferModal()">✕</button>
    </div>
    <div class="refer-modal-body">
      <p style="font-size:0.88rem;color:var(--text-mid);line-height:1.65;margin:0 0 16px">Share your link. When a friend signs up, you unlock <strong style="color:var(--text)">5 daily emails</strong> instead of 3.</p>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="refer-link-input" type="text" readonly style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.8rem;font-family:var(--sans);color:var(--text-mid);background:var(--surface);outline:none;">
        <button class="btn-refer-copy" onclick="copyReferLink()" id="copy-refer-btn">Copy link</button>
      </div>
    </div>
  </div>
</div>

<div class="page-layout" style="position:relative">

  <!-- Clickable border zone + toggle tab -->
  <div class="listings-border-zone" id="listings-border-zone" onclick="toggleListings()"></div>
  <div class="listings-toggle" id="listings-toggle" onclick="toggleListings()" title="Toggle listings">◀</div>

  <!-- ── LISTINGS PANEL (28%) ── -->
  <div class="listings-panel" id="listings-panel">
    <div class="panel-header">
      <div class="panel-title">Listings &nbsp;<span id="listing-count" style="font-weight:400;color:var(--subtle)"></span></div>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" class="search-input" id="search" placeholder="Search company or role…" autocomplete="off">
        </div>
        <div class="filter-wrap" id="filter-wrap">
          <!-- Stage filter pills rendered by JS -->
        </div>
      </div>
    </div>
    <div class="panel-body" id="listings">
      <p style="font-size:0.75rem;color:var(--subtle);padding:16px 0;">Loading listings…</p>
    </div>
  </div>

  <!-- ── PIPELINE PANEL (70%) ── -->
  <div class="pipeline-panel" id="pipeline-panel">
    <div class="pipeline-header">
      <div class="pipeline-title">Your Pipeline</div>
      <div class="pipeline-stats" id="pipeline-stats">Drag a listing here to start tracking</div>
    </div>
    <div class="kanban-track" id="kanban-track">
      <!-- Columns rendered by JS -->
    </div>
  </div>

</div>

<script>
(function () {

  // ── Helpers ──────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(d) {
    if (!d) return '';
    const dt = new Date(d);
    if (isNaN(dt)) return '';
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }
  function isNew(d) {
    if (!d) return false;
    const dt = new Date(d);
    return !isNaN(dt) && (Date.now() - dt.getTime()) <= 72 * 3600 * 1000;
  }

  // ── Stage definitions ─────────────────────────────────────────────────────
  // Each active stage optionally pairs with a rejection stage shown below it.
  const COLUMNS = [
    {
      active:    { id: 'applied',  label: 'Applied and Pending',   bg: '#E8960C', fg: '#fff'    },
      rejection: { id: 'rej-out',  label: 'Rejected Outright',     bg: '#7F1D1D', fg: '#fff'    },
    },
    {
      active:    { id: 'hirevue',  label: 'HireVue and Tested',    bg: '#D4C31E', fg: '#1A1714' },
      rejection: { id: 'rej-hv',   label: 'Rejected after HV',     bg: '#78716C', fg: '#fff'    },
    },
    {
      active:    { id: 'int1',     label: 'Interview #1',          bg: '#9CC87A', fg: '#1A1714' },
      rejection: { id: 'rej-int1', label: 'Rejected after Int. #1',bg: '#78716C', fg: '#fff'    },
    },
    {
      active:    { id: 'int2',     label: 'Interview #2',          bg: '#72B050', fg: '#fff'    },
      rejection: { id: 'rej-int2', label: 'Rejected after Int. #2',bg: '#78716C', fg: '#fff'    },
    },
    {
      active:    { id: 'ac',       label: 'Assessment Center',     bg: '#3A7246', fg: '#fff'    },
      rejection: { id: 'rej-ac',   label: 'Rejected after AC',     bg: '#78716C', fg: '#fff'    },
    },
    {
      active:    { id: 'offer',    label: 'Offer',                 bg: '#1F4530', fg: '#fff'    },
      rejection: { id: 'ghosted',  label: 'Ghosted',               bg: '#78716C', fg: '#fff'    },
    },
  ];

  const ALL_STAGES = COLUMNS.flatMap(c => c.rejection ? [c.active, c.rejection] : [c.active]);
  const STAGE_MAP  = Object.fromEntries(ALL_STAGES.map(s => [s.id, s]));

  // ── State ─────────────────────────────────────────────────────────────────
  const PIPELINE_KEY = 'inroad_pipeline_v1';
  let allJobs = [];
  let activeFilters = new Set();
  let searchQuery   = '';
  const collapsedSections = new Set();

  function loadPipeline() {
    try { return JSON.parse(localStorage.getItem(PIPELINE_KEY) || '{}'); }
    catch { return {}; }
  }
  function savePipeline(p) {
    localStorage.setItem(PIPELINE_KEY, JSON.stringify(p));
  }
  function getPipeline() { return loadPipeline(); }

  function jobsInStage(stageId) {
    const p = getPipeline();
    return Object.entries(p)
      .filter(([, s]) => s === stageId)
      .map(([id]) => allJobs.find(j => String(j.id) === String(id)))
      .filter(Boolean);
  }

  function totalTracked() { return Object.keys(getPipeline()).length; }

  function stageForJob(jobId) { return getPipeline()[String(jobId)] || null; }

  function moveToStage(jobId, stageId) {
    const p = getPipeline();
    p[String(jobId)] = stageId;
    savePipeline(p);
    renderPipeline();
    renderListings();
  }

  function removeFromPipeline(jobId) {
    const p = getPipeline();
    delete p[String(jobId)];
    savePipeline(p);
    renderPipeline();
    renderListings();
  }

  // ── Drag state ────────────────────────────────────────────────────────────
  let dragJob = null;

  // ── Render pipeline (horizontal kanban) ──────────────────────────────────
  const REJECTION_IDS = new Set(
    COLUMNS.flatMap(c => c.rejection ? [c.rejection.id] : [])
  );

  function renderPipeline() {
    const p        = getPipeline();
    const entries  = Object.entries(p);
    const total    = entries.length;
    const rejected = entries.filter(([, s]) => REJECTION_IDS.has(s)).length;
    const applied  = total - rejected;

    const statsEl = document.getElementById('pipeline-stats');
    if (total === 0) {
      statsEl.innerHTML = 'Drag a listing here to start tracking';
    } else {
      statsEl.innerHTML =
        `Total Applications: <strong>${applied}</strong> &nbsp;·&nbsp; ` +
        `Total Rejections: <strong>${rejected}</strong>`;
    }

    const track = document.getElementById('kanban-track');
    const inner = COLUMNS.map((col, i) =>
      (i > 0 ? '<div class="kanban-arrow">→</div>' : '') + colHtml(col, i)
    ).join('');
    track.innerHTML = `<div class="kanban-inner">${inner}</div>`;

    attachDropHandlers();
    attachChipHandlers();
  }

  // Offer→Ghosted is the last column (index 5), no down arrow there
  const NO_DOWN_ARROW_IDX = COLUMNS.length - 1;

  function colHtml(col, colIdx) {
    const activeJobs = jobsInStage(col.active.id);
    const rejJobs    = col.rejection ? jobsInStage(col.rejection.id) : [];

    const activeCntBg = col.active.fg === '#fff' ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.1)';
    const rejCntBg    = 'rgba(255,255,255,0.22)';

    const activeBlock = `
      <div class="kstage-block">
        <div class="kstage-hdr" style="background:${col.active.bg};color:${col.active.fg}">
          <span class="kstage-hdr-label">${esc(col.active.label)}</span>
          <span class="kstage-cnt" style="background:${activeCntBg};color:${col.active.fg}">${activeJobs.length}</span>
        </div>
        <div class="drop-zone" data-stage="${col.active.id}">
          ${activeJobs.length === 0
            ? '<span class="dz-hint">Drop here</span>'
            : activeJobs.map(j => chipHtml(j)).join('')}
        </div>
      </div>`;

    const showDownArrow = col.rejection && colIdx !== NO_DOWN_ARROW_IDX;
    const downArrow = showDownArrow ? '<div class="kstage-down-arrow">↓</div>' : (col.rejection ? '<div style="height:20px"></div>' : '');

    const rejBlock = col.rejection ? `
      <div class="kstage-block rejection-block">
        <div class="kstage-hdr" style="background:${col.rejection.bg};color:${col.rejection.fg}">
          <span class="kstage-hdr-label">${esc(col.rejection.label)}</span>
          <span class="kstage-cnt" style="background:${rejCntBg};color:${col.rejection.fg}">${rejJobs.length}</span>
        </div>
        <div class="drop-zone" data-stage="${col.rejection.id}">
          ${rejJobs.length === 0
            ? '<span class="dz-hint">Drop here</span>'
            : rejJobs.map(j => chipHtml(j)).join('')}
        </div>
      </div>` : '';

    return `<div class="kanban-col">${activeBlock}${downArrow}${rejBlock}</div>`;
  }

  function chipHtml(job) {
    return `
      <div class="pipeline-chip" draggable="true" data-id="${job.id}">
        <div class="chip-info">
          <span class="chip-co" title="${esc(job.company)}">${esc(job.company)}</span>
          <span class="chip-prog" title="${esc(job.programme)}">${esc(job.programme)}</span>
        </div>
        <button class="chip-remove" data-id="${job.id}" title="Remove">×</button>
      </div>`;
  }

  function attachDropHandlers() {
    document.querySelectorAll('.drop-zone').forEach(dz => {
      dz.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        dz.classList.add('drag-over');
      });
      dz.addEventListener('dragleave', e => {
        if (!dz.contains(e.relatedTarget)) dz.classList.remove('drag-over');
      });
      dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('drag-over');
        const raw = e.dataTransfer.getData('application/json');
        if (!raw) return;
        try {
          const job = JSON.parse(raw);
          moveToStage(job.id, dz.dataset.stage);
        } catch {}
      });
    });
  }

  function attachChipHandlers() {
    document.querySelectorAll('.pipeline-chip').forEach(chip => {
      chip.addEventListener('dragstart', e => {
        const job = allJobs.find(j => String(j.id) === chip.dataset.id);
        if (!job) return;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('application/json', JSON.stringify({ id: job.id, company: job.company, programme: job.programme }));
        chip.style.opacity = '0.4';
        setTimeout(() => { chip.style.opacity = ''; }, 0);
      });
    });
    document.querySelectorAll('.chip-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        removeFromPipeline(btn.dataset.id);
      });
    });
  }

  // ── Render listings ───────────────────────────────────────────────────────
  const PROG_ORDER = ['Summer Internship', 'Spring Week', 'Off-Cycle Internship', 'Industrial Placement', 'Graduate Programme', 'Pre-Uni', 'Events'];

  const listingsEl   = document.getElementById('listings');
  const listingCount = document.getElementById('listing-count');
  const searchEl     = document.getElementById('search');

  function filtered() {
    return allJobs.filter(j => {
      if (activeFilters.size > 0) {
        const stage = stageForJob(j.id);
        if (!activeFilters.has(stage || '__none__')) return false;
      }
      if (searchQuery && !(j.company + ' ' + j.programme).toLowerCase().includes(searchQuery)) return false;
      return true;
    });
  }

  function renderListings() {
    const jobs    = filtered();
    const newJobs = jobs.filter(j =>  isNew(j.opening_date));
    const oldJobs = jobs.filter(j => !isNew(j.opening_date));

    const byProg = {}, noProg = [];
    for (const j of oldJobs) {
      const pt = j.programme_type;
      if (pt && PROG_ORDER.includes(pt)) (byProg[pt] = byProg[pt] || []).push(j);
      else noProg.push(j);
    }

    const colHdr = `<div class="col-header"><span>Company / Programme</span><span>Opened</span><span></span></div>`;

    const newSection = newJobs.length === 0 ? '' : `
      <div class="new-section">
        <div class="section-row">
          <span class="section-pill new-pill"><span class="pill-dot"></span>New — last 72h<span class="pill-count">${newJobs.length}</span></span>
          <span class="section-line"></span>
        </div>
        ${colHdr}<div class="card-list">${newJobs.map(cardHtml).join('')}</div>
      </div>`;

    const parts = [];
    for (const pt of PROG_ORDER) {
      const g = byProg[pt];
      if (!g || !g.length) continue;
      parts.push(collapsibleSection(pt, pt, g));
    }
    if (noProg.length) parts.push(collapsibleSection('other', 'Other', noProg));
    if (!parts.length && !newJobs.length) {
      parts.push(`<p class="card-empty">No listings match your filters.</p>`);
    }

    listingsEl.innerHTML = newSection + parts.join('');

    listingsEl.querySelectorAll('.section-row.collapsible').forEach(row => {
      const key = row.dataset.key;
      row.addEventListener('click', () => {
        collapsedSections.has(key) ? collapsedSections.delete(key) : collapsedSections.add(key);
        row.classList.toggle('collapsed', collapsedSections.has(key));
        const body = row.nextElementSibling;
        if (body && body.classList.contains('section-body'))
          body.classList.toggle('collapsed', collapsedSections.has(key));
      });
    });

    listingsEl.querySelectorAll('.apply-btn-inline').forEach(btn => {
      btn.addEventListener('click', e => e.stopPropagation());
    });

    listingsEl.querySelectorAll('.job-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        const job = allJobs.find(j => String(j.id) === card.dataset.id);
        if (!job) return;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('application/json', JSON.stringify({ id: job.id, company: job.company, programme: job.programme }));
        card.classList.add('dragging');
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
    });
  }

  function collapsibleSection(key, label, jobs) {
    const collapsed = collapsedSections.has(key);
    const colHdr = `<div class="col-header"><span>Company / Programme</span><span>Opened</span><span></span></div>`;
    return `
      <div class="section-row collapsible${collapsed ? ' collapsed' : ''}" data-key="${key}">
        <span class="section-pill all-pill">${label}<span class="pill-count">${jobs.length}</span></span>
        <span class="section-line"></span>
        <span class="section-chevron">▾</span>
      </div>
      <div class="section-body${collapsed ? ' collapsed' : ''}">
        ${colHdr}<div class="card-list">${jobs.map(cardHtml).join('')}</div>
      </div>`;
  }

  function cardHtml(job) {
    const stageId  = stageForJob(job.id);
    const stage    = stageId ? STAGE_MAP[stageId] : null;
    const stageBadge = stage
      ? `<span class="stage-badge" style="background:${stage.bg};color:${stage.fg};border:1px solid rgba(0,0,0,0.08)"
           title="${esc(stage.label)}">${esc(stage.label)}</span>`
      : (job.apply_url ? `<a href="${esc(job.apply_url)}" target="_blank" rel="noopener" class="apply-btn-inline">Apply →</a>` : '<span></span>');
    const borderStyle = stage ? `border-left:3px solid ${stage.bg}` : '';
    const fresh   = isNew(job.opening_date);
    const dateStr = fmtDate(job.opening_date);
    return `
      <div class="job-card" draggable="true" data-id="${job.id}" style="${borderStyle}">
        <div class="card-row">
          <div class="card-left">
            <div class="card-company">${esc(job.company)}</div>
            <div class="card-programme">${esc(job.programme)}</div>
          </div>
          <span class="card-date${fresh ? ' fresh' : ''}">${dateStr}</span>
          <div class="card-right">${stageBadge}</div>
        </div>
      </div>`;
  }

  // ── Stage filter pills ────────────────────────────────────────────────────
  (function buildStagePills() {
    const wrap = document.getElementById('filter-wrap');
    const allStages = [...COLUMNS.flatMap(c => c.rejection ? [c.active, c.rejection] : [c.active])];
    allStages.forEach(stage => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.stageId = stage.id;
      btn.textContent = stage.label;
      btn.style.borderColor = stage.bg;
      btn.style.setProperty('--stage-bg', stage.bg);
      btn.addEventListener('click', () => {
        const id = stage.id;
        if (activeFilters.has(id)) {
          activeFilters.delete(id);
          btn.classList.remove('on');
          btn.style.background = 'transparent';
          btn.style.color = 'var(--muted)';
        } else {
          activeFilters.add(id);
          btn.classList.add('on');
          btn.style.background = stage.bg;
          btn.style.color = stage.fg;
        }
        renderListings();
      });
      wrap.appendChild(btn);
    });
  })();
  searchEl.addEventListener('input', () => {
    searchQuery = searchEl.value.trim().toLowerCase();
    renderListings();
  });

  // ── Load jobs ─────────────────────────────────────────────────────────────
  fetch('/api/opportunities')
    .then(r => r.json())
    .then(data => {
      allJobs = data.jobs || [];
      listingCount.textContent = allJobs.length;
      renderListings();
      renderPipeline();
    })
    .catch(() => {
      listingsEl.innerHTML = '<p style="font-size:0.75rem;color:var(--subtle);padding:16px 0;">Failed to load — please refresh.</p>';
    });

  renderPipeline();

  // ── Listings toggle ───────────────────────────────────────────────────────
  let listingsVisible = localStorage.getItem('inroad_listings_visible') !== 'false';

  function applyListingsState() {
    const panel  = document.getElementById('listings-panel');
    const toggle = document.getElementById('listings-toggle');
    const zone   = document.getElementById('listings-border-zone');
    if (listingsVisible) {
      panel.classList.remove('collapsed');
      toggle.classList.remove('collapsed');
      zone.classList.remove('collapsed');
      toggle.textContent = '◀';
      toggle.style.left  = 'calc(28% - 1px)';
    } else {
      panel.classList.add('collapsed');
      toggle.classList.add('collapsed');
      zone.classList.add('collapsed');
      toggle.textContent = '▶';
      toggle.style.left  = '0px';
    }
  }

  window.toggleListings = function() {
    listingsVisible = !listingsVisible;
    localStorage.setItem('inroad_listings_visible', listingsVisible);
    applyListingsState();
  };

  applyListingsState();

  // ── Auth nav ──────────────────────────────────────────────────────────────
  (function updateNav() {
    const token = sessionStorage.getItem('inroad_token') || localStorage.getItem('inroad_access_token') || localStorage.getItem('access_token') || '';
    if (!token) return;
    fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        const navEl    = document.getElementById('main-nav');
        const navRight = document.getElementById('nav-right');
        if (!navRight) return;
        const name     = d.name || '';
        const initials = name.split(' ').filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join('');
        if (navEl) {
          navEl.classList.add('nav-logged-in');
          const wm = document.getElementById('wordmark-text');
          if (wm) wm.style.color = '#fff';
        }
        const navCenter = document.getElementById('nav-center');
        if (navCenter) navCenter.innerHTML = `
          <li><a href="/opportunities">Opportunities</a></li>
          <li><a href="/pipeline" class="active">Pipeline</a></li>`;
        if (d.referral_code) {
          const inp = document.getElementById('refer-link-input');
          if (inp) inp.value = `https://www.the-inroad.com/signup?ref=${d.referral_code}`;
        }
        navRight.innerHTML = `
          <div class="nav-user">
            ${d.referral_code ? `<button class="nav-refer-btn" onclick="openReferModal()">Get 5 daily emails</button>` : ''}
            <a href="/settings" class="btn-settings">Settings</a>
            <div class="nav-initials">${esc(initials || '?')}</div>
          </div>`;
      })
      .catch(() => {});
  })();

  // ── Referral modal ────────────────────────────────────────────────────────
  window.openReferModal = function() {
    document.getElementById('refer-modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closeReferModal = function() {
    document.getElementById('refer-modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  };
  window.copyReferLink = function() {
    const val = document.getElementById('refer-link-input').value;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById('copy-refer-btn');
      btn.textContent = 'Copied ✓';
      setTimeout(() => { btn.textContent = 'Copy link'; }, 2000);
    });
  };

})();
</script>

</body>
</html>
