<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=2">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunities — inroad</title>
<meta name="description" content="Browse open UK finance internships with insider contacts at every firm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #FFFFFF;
    --surface:    #F3F1EE;
    --surface-2:  #EEECEA;
    --border:     #E6E2DB;
    --border-md:  #CEC8BF;
    --green:      #1F4530;
    --green-lite: #EAF2EC;
    --green-mid:  #A8C9B0;
    --green-deep: #122B1E;
    --text:       #1A1714;
    --text-mid:   #3D3831;
    --muted:      #7A7068;
    --subtle:     #ADA79F;
    --serif: 'Lora', Georgia, serif;
    --sans:  'Lato', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 52px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .wordmark { display: flex; align-items: center; gap: 9px; text-decoration: none; }

  .nav-right { display: flex; align-items: center; gap: 8px; }

  .btn-login {
    font-size: 0.83rem; font-weight: 700; font-family: var(--sans);
    color: var(--text); background: transparent;
    border: 1.5px solid var(--border-md);
    padding: 7px 18px; border-radius: 8px;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-login:hover { border-color: var(--green); color: var(--green); }

  .btn-nav-cta {
    font-size: 0.83rem; font-weight: 700; font-family: var(--sans);
    color: #fff; background: var(--green);
    border: none; padding: 8px 18px;
    border-radius: 8px; text-decoration: none;
    transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn-nav-cta:hover { background: var(--green-deep); transform: translateY(-1px); }

  /* ── PAGE ── */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 48px 80px;
  }

  .page-eyebrow {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }

  .page-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }

  .page-meta {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--subtle);
    font-size: 15px;
    pointer-events: none;
    line-height: 1;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 8px 12px 8px 36px;
    font-family: var(--sans);
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--subtle); }
  .search-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(31,69,48,0.07);
  }

  .filter-wrap { display: flex; align-items: center; gap: 6px; }

  .filter-btn {
    font-size: 0.78rem;
    font-weight: 700;
    background: var(--bg);
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { border-color: var(--border-md); color: var(--text-mid); }
  .filter-btn.on {
    background: var(--green-lite);
    border-color: var(--green);
    color: var(--green-deep);
  }

  .shown-count {
    font-size: 0.78rem;
    color: var(--subtle);
    white-space: nowrap;
  }

  /* ── SECTION LABEL ── */
  .section-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 32px;
    margin-bottom: 8px;
  }
  .section-row:first-child { margin-top: 0; }

  .section-pill {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .section-pill.new-pill {
    background: var(--green);
    color: #fff;
  }
  .section-pill.all-pill {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── COLUMN HEADER ── */
  .col-header {
    display: grid;
    grid-template-columns: 220px 1fr 130px 28px;
    padding: 5px 14px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
  }

  /* ── CARD LIST ── */
  .card-list { display: flex; flex-direction: column; gap: 2px; }

  .card-empty {
    font-size: 0.82rem;
    color: var(--subtle);
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
  }

  /* ── JOB CARD ── */
  .job-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  .job-card:hover { border-color: var(--border-md); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .job-card.open { border-color: var(--green); box-shadow: 0 2px 8px rgba(31,69,48,0.08); }

  .card-row {
    display: grid;
    grid-template-columns: 220px 1fr 130px 28px;
    align-items: center;
    padding: 8px 14px;
    min-height: 40px;
    user-select: none;
  }

  .card-company {
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 12px;
  }

  .card-programme {
    font-size: 0.8rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 12px;
  }

  .card-date {
    font-size: 0.78rem;
    color: var(--subtle);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .card-date.fresh { color: var(--green); font-weight: 700; }

  .card-chevron {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--subtle);
    font-size: 13px;
    transition: transform 0.2s, color 0.15s;
  }
  .job-card.open .card-chevron { transform: rotate(180deg); color: var(--green); }

  /* ── DROPDOWN ── */
  .card-dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    border-top-width: 0;
    border-top-style: solid;
    border-top-color: var(--border);
  }
  .job-card.open .card-dropdown {
    max-height: 700px;
    border-top-width: 1px;
  }

  .dropdown-inner { padding: 16px; }

  .leads-heading {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 8px;
  }

  .leads-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

  .lead-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
  }

  .lead-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--green-lite);
    color: var(--green-deep);
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border: 1.5px solid var(--green-mid);
  }

  .lead-info { flex: 1; min-width: 0; }

  .lead-name {
    font-size: 0.83rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lead-title {
    font-size: 0.76rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .lead-badges {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    align-items: center;
    margin-top: 4px;
  }

  .badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 100px;
  }
  .badge.uni {
    background: rgba(79,70,229,0.08);
    color: #3730a3;
    border: 1px solid rgba(79,70,229,0.18);
  }
  .badge.div {
    background: rgba(217,119,6,0.08);
    color: #92400e;
    border: 1px solid rgba(217,119,6,0.18);
  }
  .badge.exp {
    background: var(--green-lite);
    color: var(--green-deep);
    border: 1px solid var(--green-mid);
  }

  .lead-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-linkedin {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.73rem; font-weight: 700; font-family: var(--sans);
    background: #0A66C2; color: #fff;
    border: none; border-radius: 6px;
    padding: 5px 11px; cursor: pointer;
    text-decoration: none; white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-linkedin:hover { background: #004182; transform: translateY(-1px); }
  .btn-linkedin svg { flex-shrink: 0; }

  .btn-email {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.73rem; font-weight: 700; font-family: var(--sans);
    background: #111; color: #fff;
    border: none; border-radius: 6px;
    padding: 5px 11px; cursor: pointer;
    text-decoration: none; white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-email:hover { background: #333; transform: translateY(-1px); }
  .btn-email svg { flex-shrink: 0; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }

  .card-footer-meta {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-footer-meta .sep { color: var(--subtle); }
  .card-footer-meta strong { color: var(--text-mid); font-weight: 700; }

  .apply-btn {
    font-size: 0.8rem;
    font-weight: 700;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .apply-btn:hover { background: var(--green-deep); transform: translateY(-1px); }

  /* ── LOADING / ERROR ── */
  .state-msg {
    font-size: 0.85rem;
    color: var(--subtle);
    padding: 48px 0;
    text-align: center;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .footer-copy {
    font-size: 0.78rem;
    color: var(--subtle);
  }
  .footer-links {
    display: flex;
    gap: 20px;
    list-style: none;
  }
  .footer-links a {
    font-size: 0.78rem;
    color: var(--subtle);
    text-decoration: none;
    transition: color 0.15s;
  }
  .footer-links a:hover { color: var(--text); }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .page { padding: 28px 20px 60px; }
    nav { padding: 0 20px; }
    footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; }
    .nav-links { display: none; }
    .col-header { grid-template-columns: 140px 1fr 90px 28px; }
    .card-row { grid-template-columns: 140px 1fr 90px 28px; }
    .card-footer { flex-direction: column; align-items: flex-start; }
    .apply-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="wordmark">
    <svg width="28" height="28" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><rect width="88" height="88" rx="22" fill="#1F4530"/><path d="M26 24 L54 44 L26 64" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="54" y1="44" x2="70" y2="44" stroke="white" stroke-width="8" stroke-linecap="round"/></svg><span style="font-family:'Lora',Georgia,serif;font-weight:700;letter-spacing:-0.02em;font-size:1.25rem;color:var(--text);">inroad</span>
  </a>
  <div class="nav-right">
    <a href="/login" class="btn-login">Log in</a>
    <a href="/signup" class="btn-nav-cta">Get started free →</a>
  </div>
</nav>

<div class="page">
  <p class="page-eyebrow">UK Finance · Summer 2026</p>
  <h1 class="page-title">Opportunities</h1>
  <p class="page-meta" id="page-meta">Loading listings…</p>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" class="search-input" id="search" placeholder="Search company or programme…" autocomplete="off">
    </div>
    <div class="filter-wrap">
      <button class="filter-btn" data-div="IB">IB</button>
      <button class="filter-btn" data-div="AM">AM</button>
      <button class="filter-btn" data-div="S&T">S&amp;T</button>
    </div>
    <span class="shown-count" id="shown-count" style="display:none"></span>
  </div>

  <div id="listings">
    <p class="state-msg">Loading listings…</p>
  </div>
</div>

<footer>
  <span class="footer-copy">© 2026 inroad</span>
  <ul class="footer-links">
    <li><a href="/privacy">Privacy</a></li>
    <li><a href="/terms">Terms</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</footer>

<script>
(function () {
  let allJobs = [];
  let activeFilters = new Set();
  let searchQuery   = '';
  let openCardId    = null;

  const listingsEl  = document.getElementById('listings');
  const pageMetaEl  = document.getElementById('page-meta');
  const searchEl    = document.getElementById('search');
  const shownCountEl = document.getElementById('shown-count');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const div = btn.dataset.div;
      if (activeFilters.has(div)) { activeFilters.delete(div); btn.classList.remove('on'); }
      else                        { activeFilters.add(div);    btn.classList.add('on'); }
      render();
    });
  });

  searchEl.addEventListener('input', () => {
    searchQuery = searchEl.value.trim().toLowerCase();
    render();
  });

  fetch('/api/opportunities')
    .then(r => r.json())
    .then(data => {
      allJobs = data.jobs || [];
      pageMetaEl.innerHTML =
        `<b>${allJobs.length}</b> listing${allJobs.length !== 1 ? 's' : ''} &nbsp;·&nbsp; insider contacts at every firm`;
      render();
    })
    .catch(() => {
      listingsEl.innerHTML = '<p class="state-msg">Failed to load listings — please refresh.</p>';
      pageMetaEl.textContent = '';
    });

  function isNew(opening_date) {
    if (!opening_date) return false;
    const d = new Date(opening_date);
    return !isNaN(d) && (Date.now() - d.getTime()) <= 72 * 3600 * 1000;
  }

  function filtered() {
    return allJobs.filter(j => {
      if (activeFilters.size > 0 && !activeFilters.has(j.division)) return false;
      if (searchQuery) {
        const hay = (j.company + ' ' + j.programme).toLowerCase();
        if (!hay.includes(searchQuery)) return false;
      }
      return true;
    });
  }

  function render() {
    const jobs    = filtered();
    const newJobs = jobs.filter(j =>  isNew(j.opening_date));
    const oldJobs = jobs.filter(j => !isNew(j.opening_date));

    const filtering = activeFilters.size > 0 || searchQuery;
    shownCountEl.style.display = filtering ? '' : 'none';
    if (filtering) shownCountEl.textContent = jobs.length + ' shown';

    listingsEl.innerHTML = [
      sectionHtml('new-pill', 'New — last 72 hours', newJobs,
        newJobs.length === 0 ? '<p class="card-empty">No new listings in the last 72 hours.</p>' : null),
      sectionHtml('all-pill', 'All listings', oldJobs,
        oldJobs.length === 0 ? '<p class="card-empty">No listings match your filters.</p>' : null),
    ].join('');

    listingsEl.querySelectorAll('.job-card').forEach(card => {
      const id = card.dataset.id;
      card.querySelector('.card-row').addEventListener('click', () => toggleCard(id));
      const applyBtn = card.querySelector('.apply-btn');
      if (applyBtn) applyBtn.addEventListener('click', e => e.stopPropagation());
    });

    if (openCardId) {
      const el = listingsEl.querySelector(`.job-card[data-id="${openCardId}"]`);
      if (el) el.classList.add('open');
    }
  }

  function toggleCard(id) {
    openCardId = openCardId === id ? null : id;
    listingsEl.querySelectorAll('.job-card').forEach(c =>
      c.classList.toggle('open', c.dataset.id === openCardId));
  }

  function sectionHtml(pillClass, label, jobs, emptyHtml) {
    return `
      <div class="section-row">
        <span class="section-pill ${pillClass}">${label}</span>
        <span class="section-line"></span>
      </div>
      <div class="col-header">
        <span>Company</span><span>Programme</span><span>Opened</span><span></span>
      </div>
      ${emptyHtml || '<div class="card-list">' + jobs.map(cardHtml).join('') + '</div>'}`;
  }

  function cardHtml(job) {
    const fresh   = isNew(job.opening_date);
    const dateStr = fmtDate(job.opening_date);
    const leads   = job.leads && job.leads.length > 0;

    const leadsSection = leads
      ? `<p class="leads-heading">Insider leads for ${esc(job.company)} — ${job.leads.length} contact${job.leads.length !== 1 ? 's' : ''}</p>
         <div class="leads-list">${job.leads.map(leadHtml).join('')}</div>`
      : `<p class="leads-heading" style="margin-bottom:16px;color:var(--subtle)">No insider leads on file for this company yet.</p>`;

    return `
      <div class="job-card" data-id="${job.id}">
        <div class="card-row">
          <span class="card-company">${esc(job.company)}</span>
          <span class="card-programme">${esc(job.programme)}</span>
          <span class="card-date${fresh ? ' fresh' : ''}">${dateStr}</span>
          <span class="card-chevron">▾</span>
        </div>
        <div class="card-dropdown">
          <div class="dropdown-inner">
            ${leadsSection}
            <div class="card-footer">
              <div class="card-footer-meta">
                <span>Opened:</span> <strong>${dateStr}</strong>
                <span class="sep">&nbsp;·&nbsp;</span>
                <span>Division:</span> <strong>${esc(job.division || '—')}</strong>
              </div>
              <a href="${esc(job.apply_url || '#')}" target="_blank" rel="noopener" class="apply-btn">Apply →</a>
            </div>
          </div>
        </div>
      </div>`;
  }

  const LI_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;
  const EMAIL_ICON = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>`;

  function leadHtml(lead) {
    const initials = lead.initials || initFromName(lead.name);
    const badges   = (lead.badges || []).map(b =>
      `<span class="badge ${b}">${badgeLabel(b, lead)}</span>`).join('');

    const liHref   = lead.linkedin_url || null;
    const liBtn    = liHref
      ? `<a href="${esc(liHref)}" target="_blank" rel="noopener" class="btn-linkedin">${LI_ICON} LinkedIn</a>`
      : `<span class="btn-linkedin" style="opacity:0.35;cursor:default;">${LI_ICON} LinkedIn</span>`;

    const emailHref = lead.expected_email || null;
    const emailBtn  = emailHref
      ? `<a href="mailto:${esc(emailHref)}" class="btn-email">${EMAIL_ICON} Email</a>`
      : `<span class="btn-email" style="opacity:0.35;cursor:default;">${EMAIL_ICON} Email</span>`;

    return `
      <div class="lead-row">
        <div class="lead-avatar">${esc(initials)}</div>
        <div class="lead-info">
          <div class="lead-name">${esc(lead.name)}</div>
          <div class="lead-title">${esc(lead.title || '')}</div>
          ${badges ? `<div class="lead-badges">${badges}</div>` : ''}
        </div>
        <div class="lead-actions">${liBtn}${emailBtn}</div>
      </div>`;
  }

  function badgeLabel(b, lead) {
    if (b === 'uni') return lead.university || 'Target uni';
    if (b === 'div') return 'Diversity';
    if (b === 'exp') return 'Has offer';
    return b;
  }

  function initFromName(name) {
    if (!name) return '?';
    const p = name.trim().split(/\s+/);
    return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt)) return '—';
    return dt.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
  }

  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>

</body>
</html>
